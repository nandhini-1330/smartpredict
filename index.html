<!DOCTYPE html>
<html>
<head>
    <title>SmartPredict - Vehicle Fault Detection</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            width: 420px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 26px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #ff512f, #dd2476);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        #result {
            margin-top: 20px;
        }

        .alert-card {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .critical {
            background-color: rgba(255, 0, 0, 0.8);
        }

        .high {
            background-color: rgba(255, 140, 0, 0.9);
        }

        .normal {
            background-color: rgba(0, 200, 0, 0.8);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚗 SmartPredict</h1>

    <div class="input-group">
        <label>Speed (km/h)</label>
        <input type="number" id="speed">
    </div>

    <div class="input-group">
        <label>Temperature (°C)</label>
        <input type="number" id="temp">
    </div>

    <div class="input-group">
        <label>Battery (%)</label>
        <input type="number" id="battery">
    </div>

    <div class="input-group">
        <label>Tire Pressure (psi)</label>
        <input type="number" id="tire">
    </div>

    <div class="input-group">
        <label>
            <input type="checkbox" id="brake"> Brake Working?
        </label>
    </div>

    <button onclick="checkFault()">Check Vehicle Status</button>

    <div id="result"></div>
</div>

<script>
function checkFault() {
    const speed = document.getElementById("speed").value;
    const temp = document.getElementById("temp").value;
    const battery = document.getElementById("battery").value;
    const tire = document.getElementById("tire").value;
    const brake = document.getElementById("brake").checked;

    fetch(`/detect?speed=${speed}&temp=${temp}&battery=${battery}&tire=${tire}&brake=${brake}`)
        .then(res => res.text())
        .then(data => {
            const resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "";

            if (data === "No Fault Detected") {
                resultDiv.innerHTML = "<div class='alert-card normal'>✅ Vehicle is Safe</div>";
                return;
            }

            const alerts = data.split(",");
            alerts.forEach(alert => {
                let className = "high";
                if (alert.includes("CRITICAL")) className = "critical";

                resultDiv.innerHTML += 
                    `<div class='alert-card ${className}'>🚨 ${alert}</div>`;
            });
        });
}
</script>

</body>
</html>
